<html>
<head>
    <style>
    body{
        padding: 50px 0;
        background:linear-gradient(-45deg,red,green,purple);
    text-align:center;    
    display:flex;
    justify-content:center;
    align-items: center;
    height:100vh;
    font-family: Arial, sans-serif;
overflow:hidden;
}

ul{
    list-style: none;
    padding: 0;
}

ul li{
    font-size: 20px;
    color:white;
    margin: 10px 0;
    padding: 10px 25px;
    position: relative;
    cursor: pointer;
    transition: 0.4s;
    border: 2px solid #00f7ff;
    border-radius: 30px;
    text-align: center;
}

ul li:hover{
    color:black;
    background:#00f7ff;
    box-shadow: 0 0 50px #00f7ff,
                0 0 50px #00f7ff,
                0 0 50px #00f7ff;
    transform: scale(1.1);
}


@keyframes float{
    0%{ transform: translateY(0px); }
    50%{ transform: translateY(-15px); }
    100%{ transform: translateY(0px); }
}

ul li{
    animation: float 3s ease-in-out infinite;
}


    </style>
   </head>

<body>

<ul>
<a href="https://www.w3schools.com" target="_blank"><li>Open Website</li></a>
</ul>
</body>
