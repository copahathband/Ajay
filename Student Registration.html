<html>
<head>
<title>Student Registraion</title>
</head>
<body bgcolor="#FFEBCD">
    <h2>Student Registration Form</h2>

    <label>Roll no:</label>
    <input type="number"><br><br>

    <label>Student name:</label>
    <input type="text" placeholder="First name ">-<input type="text" placeholder="last name"><br><br>

    <label>Father name:</label>
    <input type="Text"><br><br>

    <label>Date of birth:</label>
    <input type="date"><br><br>

    <label>Mobile no:</label>
    <input type="Number"><br><br>

    <label>Password:</label>
    <input type="password"><br><br>

    <label>Gender:</label>
    <input type="radio">Male <input type="radio">Female<br><br>

    <label>Department</label>
    <input type="checkbox">CSE 
    <input type="checkbox">IT
    <input type="checkbox">ESE
    <input type="checkbox">Civil
    <input type="checkbox">Mech<br><br>

    <label>Course:</label>
    <Select>
        <option>-----Select Current Course's-----</option>
        <option>Art</option>
        <option>Scinece</option>
        <option>Commerce</option>
        <option>Math's</option>
    </Select><br><br>

    <label>Student photo:</label>
    <input type="text" placeholder="Choose file"> No file choosen<br><br>

    <label>City:</label>
    <input type="text"><br><br>

    <label>Address:</label><br>
    <textarea rows="5" cols="30"></textarea><br><br>
    
<center><input type="submit"></center>

</body>

</html>
